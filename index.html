<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheTownSquare — Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">

      <!-- Theme toggle (top-right of card) -->
      <div style="position:absolute;top:20px;right:20px;" class="theme-toggle">
        <button class="theme-btn" data-theme="dark">Dark</button>
        <button class="theme-btn" data-theme="light">Light</button>
      </div>

      <div class="login-logo">TS</div>
      <h1 class="login-title">Welcome to TheTownSquare</h1>
      <p class="login-sub">Smart housing society management</p>

      <!-- Google Sign-In button -->
      <a href="dashboard.html" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/>
          <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/>
          <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/>
          <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.31z"/>
        </svg>
        Continue with Google
      </a>

      <p style="font-size:12px;color:var(--text2);line-height:1.6;">
        By signing in you agree to our terms of service.<br/>
        Your society data is fully isolated and secure.
      </p>

      <div class="login-features">
        <div class="login-feature"><span style="font-size:16px">💳</span> Bill management</div>
        <div class="login-feature"><span style="font-size:16px">⚑</span> Complaint tracking</div>
        <div class="login-feature"><span style="font-size:16px">🚪</span> Visitor logs</div>
        <div class="login-feature"><span style="font-size:16px">📢</span> Society notices</div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
