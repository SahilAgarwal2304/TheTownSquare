<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>TheTownSquare | Sunrise Heights Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app" id="app">
    <!-- SIDEBAR BACKDROP (mobile) -->
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">TS</div>
        <span class="logo-text">TheTownSquare</span>
      </div>
      <nav class="nav">
        <div class="nav-label">Main</div>
        <div class="nav-item active" data-page="dashboard"><span class="nav-icon">⊞</span> Dashboard</div>
        <div class="nav-item" data-page="bills"><span class="nav-icon">💳</span> Bills & Payments</div>
        <div class="nav-item" data-page="complaints"><span class="nav-icon">⚑</span> Complaints</div>
        <div class="nav-item" data-page="visitors"><span class="nav-icon">🚪</span> Visitors</div>
        <div class="nav-item" data-page="notices"><span class="nav-icon">📢</span> Notices</div>
        <div class="nav-label">Management</div>
        <div class="nav-item" data-page="admin"><span class="nav-icon">⚙</span> Admin Panel</div>
        <div class="nav-item" data-page="residents"><span class="nav-icon">👥</span> Residents</div>
      </nav>
      <div class="sidebar-bottom">
        <div class="user-card">
          <div class="avatar">AR</div>
          <div class="user-info">
            <div class="user-name">Arjun Rao</div>
            <div class="user-role">Co-Leader</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- TOPBAR -->
    <header class="topbar">
      <button class="menu-btn" id="menuToggle" aria-label="Menu">☰</button>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search flats, residents, bills..." id="globalSearch" />
      </div>
      <div class="topbar-right">
        <div class="toggle-wrap">
          <div class="toggle-opt on" id="darkBtn">Dark</div>
          <div class="toggle-opt" id="lightBtn">Light</div>
        </div>
        <button class="icon-btn badge-btn" id="notifBell">
          🔔
          <span class="notif-dot"></span>
        </button>
        <div class="topbar-avatar" id="avatarBtn">AR</div>
      </div>
    </header>

    <!-- MAIN CONTENT: pages injected dynamically but we keep static structure for clarity -->
    <main class="main" id="mainContent">
      <!-- Pages will be managed by JavaScript, but we can keep static HTML inside containers for reliability.
           For clean separation, JS will mount initial pages, but to respect the "3 files" approach we embed initial structure inside JS.
           However we keep static HTML as backup. We'll let JS fully control page visibility to keep modular. -->
    </main>
  </div>

  <!-- MODAL OVERLAYS (static but used by JS) -->
  <div class="overlay" id="addBillModal">
    <div class="modal">
      <div class="modal-title">Create New Bill <button class="close-btn" data-modal="addBillModal">✕</button></div>
      <div class="form-row"><label class="form-label">Flat Number</label><input class="form-input" id="billFlat" type="text" placeholder="A-101" /></div>
      <div class="form-row"><label class="form-label">Bill Type</label><select class="form-input" id="billType"><option>Maintenance</option><option>Water</option><option>Gas Pipeline</option><option>Parking</option></select></div>
      <div class="form-grid">
        <div class="form-row"><label class="form-label">Amount (₹)</label><input class="form-input" id="billAmount" type="number" placeholder="3200" /></div>
        <div class="form-row"><label class="form-label">Due Date</label><input class="form-input" id="billDue" type="date" /></div>
      </div>
      <div class="form-row"><label class="form-label">Notes (optional)</label><textarea class="form-input" id="billNotes" rows="2" placeholder="Any additional info..."></textarea></div>
      <div style="display:flex;gap:10px;margin-top:4px"><button class="btn btn-primary" id="confirmBillBtn" style="flex:1">Create Bill</button><button class="btn btn-outline" data-modal="addBillModal" style="flex:1">Cancel</button></div>
    </div>
  </div>
  <div class="overlay" id="addComplaintModal">
    <div class="modal">
      <div class="modal-title">Raise Complaint <button class="close-btn" data-modal="addComplaintModal">✕</button></div>
      <div class="form-row"><label class="form-label">Complaint Title</label><input class="form-input" id="complaintTitle" type="text" placeholder="Brief title" /></div>
      <div class="form-row"><label class="form-label">Description</label><textarea class="form-input" id="complaintDesc" rows="3" placeholder="Describe issue..."></textarea></div>
      <div class="form-grid">
        <div class="form-row"><label class="form-label">Priority</label><select class="form-input" id="complaintPriority"><option>Low</option><option>Medium</option><option>High</option></select></div>
        <div class="form-row"><label class="form-label">Flat Number</label><input class="form-input" id="complaintFlat" type="text" placeholder="Your flat" /></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:4px"><button class="btn btn-primary" id="confirmComplaintBtn" style="flex:1">Submit</button><button class="btn btn-outline" data-modal="addComplaintModal" style="flex:1">Cancel</button></div>
    </div>
  </div>
  <div class="overlay" id="addVisitorModal">
    <div class="modal"><div class="modal-title">Add Expected Visitor <button class="close-btn" data-modal="addVisitorModal">✕</button></div>
      <div class="form-row"><label class="form-label">Visitor Name</label><input class="form-input" id="visitorName" type="text" placeholder="Full name" /></div>
      <div class="form-grid"><div class="form-row"><label class="form-label">Visit Type</label><select class="form-input" id="visitorType"><option>Guest</option><option>Delivery</option><option>Service</option></select></div>
      <div class="form-row"><label class="form-label">Expected Date</label><input class="form-input" id="visitorDate" type="date" /></div></div>
      <div class="form-row"><label class="form-label">Purpose</label><input class="form-input" id="visitorPurpose" type="text" placeholder="Reason" /></div>
      <div style="display:flex;gap:10px;margin-top:4px"><button class="btn btn-primary" id="confirmVisitorBtn" style="flex:1">Add Visitor</button><button class="btn btn-outline" data-modal="addVisitorModal" style="flex:1">Cancel</button></div>
    </div>
  </div>
  <div class="overlay" id="addNoticeModal">
    <div class="modal"><div class="modal-title">Post Notice <button class="close-btn" data-modal="addNoticeModal">✕</button></div>
      <div class="form-row"><label class="form-label">Notice Title</label><input class="form-input" id="noticeTitle" type="text" placeholder="Title" /></div>
      <div class="form-row"><label class="form-label">Content</label><textarea class="form-input" id="noticeContent" rows="4" placeholder="Details..."></textarea></div>
      <div class="form-grid"><div class="form-row"><label class="form-label">Visibility</label><select class="form-input" id="noticeVisibility"><option>All Residents</option><option>Block A Only</option><option>Committee Only</option></select></div>
      <div class="form-row"><label class="form-label">Priority</label><select class="form-input" id="noticePriority"><option>Normal</option><option>Important</option><option>Urgent</option></select></div></div>
      <div style="display:flex;gap:10px;margin-top:4px"><button class="btn btn-primary" id="confirmNoticeBtn" style="flex:1">Post Notice</button><button class="btn btn-outline" data-modal="addNoticeModal" style="flex:1">Cancel</button></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
